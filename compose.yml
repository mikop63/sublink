services:
 
  vless-aggregator:
    build: .
    container_name: vless-aggregator
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - ./config.json:/app/config.json
    environment:
      CONFIG_PATH: /app/config.json
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - internal
 
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "8999:8999"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # - /etc/letsencrypt:/etc/nginx/certs:ro        # папка с cert.crt и cert.key
      - ./certs:/etc/nginx/certs:ro        # папка с cert.crt и cert.key
    depends_on:
      - vless-aggregator
    networks:
      - internal
 
networks:
  internal:
    driver: bridge
 